<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download Expense Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f8fb;
            padding: 50px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-top: 30px;
        }

        .btn {
            background-color: #3498db;
            color: white;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 6px;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .back-btn {
            margin-top: 20px;
        }

        .back-btn a {
            text-decoration: none;
            background-color: #2ecc71;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
        }

        .back-btn a:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
    <h1>Download Expense Report</h1>

    <div class="container">
        <p>Click the button below to download the full expense report in CSV format.</p>
        <a href="{{ url_for('download_report') }}" class="btn">Download Report</a>
    </div>

    <div class="back-btn">
        <a href="{{ url_for('home') }}">Back to Home</a>
    </div>
</body>
</html>
